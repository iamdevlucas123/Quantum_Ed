version: '3.8'

services: 
  client:
    build: .
    ports:
      - 3000:3000
  
  api:
    build: ./api
    ports:
      - 3001:3000
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - db
    
  db:
    image: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
