
services: 
  client:
    build:
      context: ./client
      dockerfile: dockerfile
    ports:
      - 3000:5173
  
  api:
    build:
      context: ./api
      dockerfile: dockerfile
    ports:
      - 3001:3000
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    
  db:
    image: postgres:17
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: quantum_ed
      POSTGRES_HOST_AUTH_METHOD: md5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - quantum_ed_db_data:/var/lib/postgresql/data

volumes:
  quantum_ed_db_data: 
