name: E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: quantum
          POSTGRES_PASSWORD: quantum
          POSTGRES_DB: quantum_ed_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://quantum:quantum@localhost:5432/quantum_ed_test?schema=public
      JWT_SECRET: test-access-secret
      ACCESS_TOKEN_EXPIRES_IN: 15m
      REFRESH_TOKEN_SECRET: test-refresh-secret
      REFRESH_TOKEN_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173
      VITE_API_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            app/package-lock.json

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Migrate and seed database
        working-directory: api
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npm run import:courses:integration

      - name: Start API
        working-directory: api
        run: |
          npm run dev > ../api-e2e.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://localhost:3000/public/stats > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat ../api-e2e.log
          exit 1

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Install Playwright browsers
        working-directory: app
        run: npx playwright install --with-deps chromium

      - name: Start app
        working-directory: app
        run: |
          npm run dev -- --host 127.0.0.1 --port 5173 > ../app-e2e.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://localhost:5173 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat ../app-e2e.log
          exit 1

      - name: Run E2E
        working-directory: app
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: app/test-results/
          retention-days: 14

      - name: Upload E2E server logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-server-logs
          path: |
            api-e2e.log
            app-e2e.log
          retention-days: 14
